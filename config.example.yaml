# =============================================================================
# VM Power Manager — Example Deployment Config (Layer 2)
#
# Copy this file to your private deployment directory and fill in your values.
# Only override what's different from bundled defaults.
# Full reference: docs/CONFIG_REFERENCE.md
# =============================================================================

app:
  name: vm-power-manager
  environment: production
  # debug_mode: true     # Verbose logging
  # dry_run: true        # Alerts only, no VM actions
  # deployment_id: "my-deployment"   # Unique ID for this deployment (optional)

  # Runtime version-compatibility check (fetches .manifest.json from upstream).
  # Disable for air-gapped environments or forks.
  # manifest:
  #   enabled: false

slack:
  default_channel: "#vm-alerts"
  # access_control: "mentioned_only"   # or "channel_members", "specific_users"

state:
  backend: "gcs_bucket"              # gcs_bucket | firestore | redis | file
  project: "YOUR-GCP-PROJECT-ID"
  bucket: "YOUR-STATE-BUCKET-NAME"
  prefix: "state/"

# Override defaults per-deployment (optional)
# defaults:
#   idle_threshold_below: 5
#   idle_duration_minutes: 30
#   warning_minutes: 5
#   auto_stop_enabled: false
#
#   metric_sources:
#     gpu_utilization: "monitoring_api"   # or "ssh"
#     cpu_utilization: "monitoring_api"
#     memory_utilization: "monitoring_api"
#     disk_utilization: "ssh"             # or "monitoring_api"
#     process_count: "ssh"
#
#   gpu_protection:
#     enabled: true
#     check_before_stop: true       # Warn in Slack before stopping GPU VMs
#     fallback_zones: []            # Global fallback zones (override per-VM)
#     max_start_retries: 3          # Retry in same zone before fallback
#     retry_delay_seconds: 30       # Delay between retries
#     auto_migrate: false           # Auto-migrate VM to fallback zone
#     notify_on_zone_change: true   # Slack alert if VM changes zone
#
#   gpu_monitoring:
#     enabled: true                 # Alert when GPU VMs run continuously
#     alert_interval_minutes: 60    # Alert every N minutes (per GPU VM)
#     alert_after_minutes: 60       # Only alert after VM has run this long
#     include_in_regular_check: true

vms:
  - name: "gpu-vm-01"
    cloud: "gcp"                     # gcp | aws | azure | ssh
    gcp_name: "gpu-vm-01"
    project: "YOUR-GCP-PROJECT-ID"
    zone: "us-central1-a"
    gpu_type: "nvidia-tesla-t4"
    notify_users: ["@user1", "@user2"]

  - name: "gpu-vm-02"
    cloud: "gcp"
    gcp_name: "gpu-vm-02"
    project: "YOUR-GCP-PROJECT-ID"
    zone: "us-central1-b"
    gpu_type: "nvidia-tesla-a100"
    notify_users: ["@user3"]
    # Per-VM overrides:
    idle_metric: "combined"
    idle_duration_minutes: 45
    process_monitoring:
      watch_processes: ["python", "uvicorn", "node"]
      watch_commands: ["training_script"]
    post_start_commands:
      - "sudo systemctl start nginx"
    # GPU protection — per-VM fallback zones:
    gpu_protection:
      fallback_zones: ["us-central1-a", "us-central1-c", "us-central1-f"]
      auto_migrate: true
    # GPU monitoring — alert more frequently for expensive A100 VMs:
    gpu_monitoring:
      alert_interval_minutes: 30

  # SSH-only VM (non-GCP):
  # - name: "on-prem-gpu"
  #   cloud: "ssh"
  #   ssh_host: "10.0.1.50"
  #   ssh_user: "admin"
  #   ssh_key_env: "SSH_PRIVATE_KEY_PATH"
  #   gpu_type: "nvidia-rtx-4090"
  #   notify_users: ["@admin"]
